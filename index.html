<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Budget PWA</title>
    <meta name="description" content="Simple Budget PWA deployed on GitHub Pages" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #0f172a, #1e293b);
      }

      main {
        width: min(680px, 92vw);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 2rem;
        color: #f8fafc;
        backdrop-filter: blur(6px);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.5rem, 4vw, 2.4rem);
      }

      p {
        line-height: 1.6;
        margin-bottom: 0;
      }

      code {
        background: rgba(255, 255, 255, 0.14);
        padding: 0.15rem 0.35rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Simple Budget PWA</h1>
      <p>
        GitHub Pages deployment is configured. Push to <code>main</code> and GitHub Actions
        will publish this site.
      </p>
    </main>
  </body>
</html>
