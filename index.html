<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Budget PWA</title>
    <meta name="description" content="Track monthly budget and expenses offline." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Simple Budget PWA</h1>

      <section class="card">
        <h2>Add transaction</h2>
        <form id="transactionForm" class="stack">
          <label for="amountInput">
            Amount
            <input id="amountInput" type="number" min="0" step="0.01" inputmode="decimal" required />
          </label>
          <label for="categoryInput">
            Category / note
            <input id="categoryInput" type="text" maxlength="80" required />
          </label>
          <button type="submit">Add</button>
        </form>
      </section>

      <section class="card">
        <h2>Category spending</h2>
        <p id="allocationSummary" class="allocation-summary" aria-live="polite"></p>
        <ul id="categoryTotalsList" class="category-totals"></ul>
      </section>

      <section class="card">
        <h2>Transactions</h2>
        <ul id="transactionList" class="transactions"></ul>
        <button id="clearTransactionsBtn" class="danger-btn" type="button">Clear all transactions</button>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <label class="budget-label" for="budgetInput">
          Monthly budget
          <input id="budgetInput" type="number" min="0" step="0.01" inputmode="decimal" />
        </label>
        <p id="remainingBudget" class="remaining" aria-live="polite"></p>
        <form id="categoryAllocationForm" class="stack compact-stack">
          <label for="allocationCategoryInput">
            Category
            <input id="allocationCategoryInput" type="text" maxlength="80" placeholder="e.g. Groceries" required />
          </label>
          <label for="allocationAmountInput">
            Allocated amount
            <input id="allocationAmountInput" type="number" min="0" step="0.01" inputmode="decimal" required />
          </label>
          <button type="submit">Set category allocation</button>
        </form>
      </section>

      <section class="card">
        <h2>Backup</h2>
        <div class="tools">
          <button id="exportBtn" type="button">Export JSON</button>
          <label class="import-btn" for="importInput">Import JSON</label>
          <input id="importInput" type="file" accept="application/json" hidden />
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
